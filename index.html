<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Room Lighting Plan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="desktop-layout">
        <div id="bg-1" class="bg-image active"></div>
        <div id="bg-2" class="bg-image"></div>
        <div class="clock-overlay">
            <img src="alarm/" class="main-clock" alt="Clock" onclick="nextTime()">
        </div>
    </div>

    <div class="mobile-layout">
        <div class="mobile-clock-container">
            <img src="alarm/alarm_6_30.png" class="main-clock" alt="Clock" onclick="nextTime()">
        </div>

        <div class="mobile-room-list">
            
            <div class="mobile-room-container" id="m-room-container-1">
                <div class="mobile-room-item layer-1 active"></div>
                <div class="mobile-room-item layer-2"></div>
            </div>

            <div class="mobile-room-container" id="m-room-container-2">
                <div class="mobile-room-item layer-1 active"></div>
                <div class="mobile-room-item layer-2"></div>
            </div>

            <div class="mobile-room-container" id="m-room-container-3">
                <div class="mobile-room-item layer-1 active"></div>
                <div class="mobile-room-item layer-2"></div>
            </div>

            <div class="mobile-room-container" id="m-room-container-4">
                <div class="mobile-room-item layer-1 active"></div>
                <div class="mobile-room-item layer-2"></div>
            </div>
            
        </div>

        <div class="mobile-clock-container">
            <img src="alarm/alarm_6_30.png" class="main-clock" alt="Clock" onclick="nextTime()">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
